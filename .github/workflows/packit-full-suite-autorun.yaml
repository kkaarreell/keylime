#testing-farm:centos-stream-10-x86_64:fast
#

name: Trigger Full Test on Fast Success
on:
  check_run:
    types: [completed]
  workflow_dispatch:        # Allows manual triggering
    inputs:
      pr_number:
        description: 'PR number to comment on'
        required: true

jobs:
  trigger-full:
    # We only act if the finished check was the Packit "fast" test and it was successful
    if: >
      github.event.check_run.conclusion == 'success' &&
      contains(github.event.check_run.name, 'testing-farm:') &&
      contains(github.event.check_run.name, ':fast') &&
      (github.event.check_run.pull_requests[0].author_association == 'MEMBER' ||
       github.event.check_run.pull_requests[0].author_association == 'OWNER' ||
       github.event.check_run.pull_requests[0].author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Full Test
        run: |
          # Use the input if manual, otherwise use the payload array
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.check_run.pull_requests[0].number }}"
          fi
          
          gh pr comment "$PR_NUMBER" --body "/packit test --identifier full" --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.KEYLIME_REPO_COMMENT_TOKEN }}
